<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4338ca;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d0d1a"/>

  <!-- Clipboard body -->
  <rect x="12" y="10" width="40" height="48" rx="6" fill="url(#boardGrad)" opacity="0.9"/>
  <rect x="12" y="10" width="40" height="48" rx="6" fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.4"/>

  <!-- Clipboard clip at top -->
  <rect x="24" y="7" width="16" height="8" rx="3" fill="#1e1b4b" stroke="#6366f1" stroke-width="1"/>
  <rect x="28" y="5" width="8" height="4" rx="2" fill="#312e81"/>

  <!-- Lightning bolt -->
  <path d="M 36 18 L 28 34 L 34 34 L 28 50 L 42 30 L 36 30 Z"
        fill="url(#boltGrad)"
        filter="url(#glow)"
        opacity="0.95"/>

  <!-- Subtle lines on clipboard -->
  <line x1="16" y1="42" x2="48" y2="42" stroke="white" stroke-width="1" stroke-opacity="0.12" stroke-linecap="round"/>
  <line x1="16" y1="47" x2="40" y2="47" stroke="white" stroke-width="1" stroke-opacity="0.12" stroke-linecap="round"/>
</svg>
